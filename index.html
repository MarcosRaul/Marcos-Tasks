<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mis Tareas" />
  <title>Mis Tareas del Día</title>
  <link rel="manifest" href="data:application/json,{
    &quot;name&quot;: &quot;Mis Tareas&quot;,
    &quot;short_name&quot;: &quot;Tareas&quot;,
    &quot;start_url&quot;: &quot;.&quot;,
    &quot;display&quot;: &quot;standalone&quot;,
    &quot;background_color&quot;: &quot;%230f1117&quot;,
    &quot;theme_color&quot;: &quot;%230f1117&quot;,
    &quot;icons&quot;: [{
      &quot;src&quot;: &quot;data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%230f1117'/%3E%3Crect x='140' y='160' width='232' height='24' rx='12' fill='%234f8ef7'/%3E%3Crect x='140' y='220' width='180' height='24' rx='12' fill='%23ffffff' opacity='0.6'/%3E%3Crect x='140' y='280' width='200' height='24' rx='12' fill='%23ffffff' opacity='0.6'/%3E%3Crect x='140' y='340' width='150' height='24' rx='12' fill='%23ffffff' opacity='0.3'/%3E%3C/svg%3E&quot;,
      &quot;sizes&quot;: &quot;512x512&quot;,
      &quot;type&quot;: &quot;image/svg+xml&quot;,
      &quot;purpose&quot;: &quot;any maskable&quot;
    }]
  }">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%230f1117'/%3E%3Crect x='140' y='160' width='232' height='24' rx='12' fill='%234f8ef7'/%3E%3Crect x='140' y='220' width='180' height='24' rx='12' fill='%23ffffff' opacity='0.6'/%3E%3Crect x='140' y='280' width='200' height='24' rx='12' fill='%23ffffff' opacity='0.6'/%3E%3Crect x='140' y='340' width='150' height='24' rx='12' fill='%23ffffff' opacity='0.3'/%3E%3C/svg%3E">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --accent: #4f8ef7;
      --accent2: #7c3aed;
      --green: #22c55e;
      --text: #f0f2f8;
      --muted: #7a7f9a;
      --border: #2a2f47;
      --radius: 16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 0;
      display: flex;
      flex-direction: column;
    }

    header {
      background: linear-gradient(135deg, #1a1d27 0%, #16192a 100%);
      padding: 52px 24px 28px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 6px;
    }

    .greeting {
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .date-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 500;
    }

    h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
      line-height: 1.2;
    }

    .progress-bar-wrap {
      background: var(--surface2);
      border-radius: 99px;
      height: 6px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .progress-label {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }

    .progress-label span:last-child {
      color: var(--accent);
      font-weight: 600;
    }

    main {
      flex: 1;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .task-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .task-card:active { transform: scale(0.98); }

    .task-card.done {
      opacity: 0.5;
      background: var(--surface);
    }

    .task-card.done .task-name {
      text-decoration: line-through;
      color: var(--muted);
    }

    .checkbox {
      width: 24px;
      height: 24px;
      min-width: 24px;
      border-radius: 8px;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
      transition: all 0.2s ease;
      background: transparent;
    }

    .task-card.done .checkbox {
      background: var(--green);
      border-color: var(--green);
    }

    .checkmark {
      display: none;
      color: white;
      font-size: 13px;
      font-weight: 700;
    }

    .task-card.done .checkmark { display: block; }

    .task-info { flex: 1; min-width: 0; }

    .task-name {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 5px;
      line-height: 1.3;
      transition: color 0.2s;
    }

    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .tag {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
      letter-spacing: 0.02em;
    }

    .tag-work { background: rgba(79,142,247,0.15); color: #4f8ef7; }
    .tag-time { background: rgba(124,58,237,0.15); color: #a78bfa; }
    .tag-high { background: rgba(239,68,68,0.15); color: #f87171; }
    .tag-med  { background: rgba(234,179,8,0.15);  color: #fbbf24; }
    .tag-low  { background: rgba(34,197,94,0.15);  color: #4ade80; }

    footer {
      padding: 16px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
      background: var(--bg);
      border-top: 1px solid var(--border);
    }

    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active { transform: scale(0.97); }
    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      padding: 28px 20px max(28px, env(safe-area-inset-bottom));
      width: 100%;
      max-width: 500px;
      border-top: 1px solid var(--border);
    }

    .modal-handle {
      width: 40px;
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      margin: 0 auto 20px;
    }

    .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .modal p { font-size: 14px; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }

    .report-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      font-size: 13px;
      line-height: 1.6;
      color: var(--text);
      margin-bottom: 16px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .modal-actions { display: flex; flex-direction: column; gap: 10px; }

    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--green);
      color: white;
      padding: 10px 20px;
      border-radius: 99px;
      font-size: 14px;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      white-space: nowrap;
      z-index: 200;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .all-done-banner {
      display: none;
      background: linear-gradient(135deg, rgba(34,197,94,0.15), rgba(79,142,247,0.1));
      border: 1px solid rgba(34,197,94,0.3);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
    }

    .all-done-banner.show { display: block; }
    .all-done-banner .emoji { font-size: 32px; margin-bottom: 6px; }
    .all-done-banner p { font-size: 14px; color: var(--green); font-weight: 600; }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <span class="greeting">Hola, Marcos 👋</span>
    <span class="date-badge" id="dateBadge"></span>
  </div>
  <h1>Tareas de hoy</h1>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
  </div>
  <div class="progress-label">
    <span id="progressText">0 de 1 completadas</span>
    <span id="progressPct">0%</span>
  </div>
</header>

<main id="taskList"></main>
<div class="toast" id="toast"></div>

<footer>
  <button class="btn btn-primary" onclick="openReport()">📋 Generar reporte del día</button>
</footer>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>Reporte del día</h2>
    <p>Al dar clic en "Enviar a Claude" se abrirá la conversación con el reporte listo para reagendar lo pendiente.</p>
    <div class="report-box" id="reportContent"></div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="sendToClaude()">🤖 Enviar a Claude</button>
      <button class="btn btn-secondary" onclick="closeModalBtn()">Cerrar</button>
    </div>
  </div>
</div>

<script>
  const tasks = [
    {
      id: 1,
      name: "Terminar financiero de Casa Capricorn",
      work: "Walters Management",
      time: "1.5 hrs",
      priority: "alta",
      notes: "Revisar correos: Capricorn, financiero, balance, HOA statement"
    }
  ];

  let state = JSON.parse(localStorage.getItem('checklistState') || '{}');

  const days = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const today = new Date();
  document.getElementById('dateBadge').textContent =
    `${days[today.getDay()]} ${today.getDate()} ${months[today.getMonth()]}`;

  function render() {
    const list = document.getElementById('taskList');
    const done = tasks.filter(t => state[t.id]).length;
    const pct = Math.round((done / tasks.length) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent =
      `${done} de ${tasks.length} completada${tasks.length !== 1 ? 's' : ''}`;
    document.getElementById('progressPct').textContent = pct + '%';

    const priorityTag = { alta: 'tag-high', media: 'tag-med', baja: 'tag-low' };
    let html = '';
    tasks.forEach(t => {
      const isDone = !!state[t.id];
      html += `
        <div class="task-card ${isDone ? 'done' : ''}" onclick="toggle(${t.id})">
          <div class="checkbox"><span class="checkmark">✓</span></div>
          <div class="task-info">
            <div class="task-name">${t.name}</div>
            <div class="task-meta">
              <span class="tag tag-work">${t.work}</span>
              <span class="tag tag-time">⏱ ${t.time}</span>
              <span class="tag ${priorityTag[t.priority]}">● ${t.priority}</span>
            </div>
          </div>
        </div>`;
    });
    if (done === tasks.length) {
      html += `<div class="all-done-banner show"><div class="emoji">🎉</div><p>¡Completaste todas las tareas del día!</p></div>`;
    }
    list.innerHTML = html;
  }

  function toggle(id) {
    state[id] = !state[id];
    localStorage.setItem('checklistState', JSON.stringify(state));
    showToast(state[id] ? '✓ Tarea completada' : 'Tarea desmarcada');
    render();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
  }

  function openReport() {
    const done = tasks.filter(t => state[t.id]).map(t => `✅ ${t.name}`);
    const pending = tasks.filter(t => !state[t.id]).map(t => `⏳ ${t.name}`);
    const dateStr = `${days[today.getDay()]} ${today.getDate()} de ${months[today.getMonth()]}`;
    let report = `Reporte del día — ${dateStr}\n\n`;
    if (done.length) report += `COMPLETADAS:\n${done.join('\n')}\n\n`;
    if (pending.length) report += `PENDIENTES:\n${pending.join('\n')}\n\n`;
    if (!pending.length) report += `🎉 ¡Todas las tareas del día completadas!\n\n`;
    report += `Por favor reagenda lo pendiente en Google Calendar con la nota "Pendiente del día anterior".`;
    document.getElementById('reportContent').textContent = report;
    document.getElementById('modalOverlay').classList.add('open');
  }

  function sendToClaude() {
    const content = document.getElementById('reportContent').textContent;
    window.open(`https://claude.ai/new?q=${encodeURIComponent(content)}`, '_blank');
    closeModalBtn();
  }

  function closeModal(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModalBtn();
  }

  function closeModalBtn() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  render();
</script>
</body>
</html>
